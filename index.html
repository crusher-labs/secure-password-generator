<!DOCTYPE html>
<html lang="en"

      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css" integrity="sha384-QYfQeMTJKWZuoEgfBv8ZvJwG12qr6YW8SF6ziK3aHL9luxKjnoswdj/yek7EwpJN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css" integrity="sha384-+mIUnYgeB+0Qf10OjT3tSbT2al2Y8erQfw/uws4os7AxVKNLYeEUW5zHUehGBTVq" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js" integrity="sha384-gNDnPKn5AoF0e4Q555fGbM+snO+UCP3/z4ErG3cyS/Akusg/bzTO+AYmG1WAMnab" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 36rem; margin-inline: auto; }

        .tool-password-display {
            position: relative;
            display: flex; align-items: center;
            gap: var(--crusher-spacing-3);
            padding: var(--crusher-spacing-4);
            border-radius: var(--crusher-radius-lg);
            border: 1px solid var(--crusher-border-primary);
            background: var(--crusher-background-muted);
        }
        .tool-password-value {
            flex-grow: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--crusher-font-size-xl);
            color: var(--crusher-text-primary);
            letter-spacing: 0.05em;
            word-break: break-all;
        }
        .tool-copy-icon-btn {
            background: transparent;
            border: 0;
            padding: var(--crusher-spacing-1);
            color: var(--crusher-text-secondary);
            cursor: pointer;
            transition: color var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }
        .tool-copy-icon-btn:hover { color: var(--crusher-color-brand-primary); }
        .tool-copy-feedback {
            position: absolute;
            inset-block-start: -1.5rem;
            inset-inline-end: 0;
            font-size: var(--crusher-font-size-sm);
            color: var(--crusher-color-brand-primary);
            opacity: 0;
            transition: opacity var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }
        .tool-copy-feedback[data-visible="true"] { opacity: 1; }

        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-5); }

        .tool-length-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--crusher-spacing-2); }
        .tool-length-label { font-weight: 500; color: var(--crusher-text-primary); }
        .tool-length-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: var(--crusher-font-size-2xl);
            color: var(--crusher-color-brand-primary);
        }

        input[type="range"].tool-range {
            -webkit-appearance: none; appearance: none;
            width: 100%; block-size: 0.5rem;
            background: var(--crusher-background-muted);
            border: 1px solid var(--crusher-border-primary);
            border-radius: var(--crusher-radius-full); outline: none;
        }
        input[type="range"].tool-range::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            inline-size: 1.25rem; block-size: 1.25rem;
            background: var(--crusher-color-brand-primary);
            border: 2px solid var(--crusher-background-surface);
            border-radius: var(--crusher-radius-full);
            box-shadow: var(--crusher-shadow-sm);
            cursor: pointer;
        }
        input[type="range"].tool-range::-moz-range-thumb {
            inline-size: 1.25rem; block-size: 1.25rem;
            background: var(--crusher-color-brand-primary);
            border: 2px solid var(--crusher-background-surface);
            border-radius: var(--crusher-radius-full);
            box-shadow: var(--crusher-shadow-sm);
            cursor: pointer;
        }

        .tool-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 14rem), 1fr));
            gap: var(--crusher-spacing-3);
            padding-top: var(--crusher-spacing-2);
        }
        .tool-checkbox-row {
            display: flex; align-items: center; gap: var(--crusher-spacing-2);
        }
        input[type="checkbox"].tool-checkbox {
            inline-size: 1.15rem; block-size: 1.15rem;
            accent-color: var(--crusher-color-brand-primary);
            cursor: pointer;
        }
        .tool-checkbox-label { font-size: var(--crusher-font-size-sm); color: var(--crusher-text-secondary); cursor: pointer; }

        .tool-error {
            min-block-size: 1.25rem;
            text-align: center;
            font-size: var(--crusher-font-size-sm);
            color: #ef4444;
        }

        .tool-action-block {
            inline-size: 100%;
            padding-block: var(--crusher-spacing-3);
            padding-inline: var(--crusher-spacing-4);
            border-radius: var(--crusher-radius-lg);
            font-weight: 700;
            font-size: var(--crusher-font-size-md);
        }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Secure Password Generator</h1>
            <p class="crusher-tool-lede">Create strong, random passwords to protect your accounts.</p>
        </header>

        <div class="tool-stack">
            <div class="tool-password-display">
                <span id="password-display" class="tool-password-value"></span>
                <button id="copy-btn" type="button" class="tool-copy-icon-btn" title="Copy Password" aria-label="Copy Password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true"><path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2Zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6ZM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1H2Z"/></svg>
                </button>
                <span id="copy-feedback" class="tool-copy-feedback">Copied!</span>
            </div>

            <section class="crusher-tool-surface tool-section">
                <div>
                    <div class="tool-length-row">
                        <label for="length-slider" class="tool-length-label">Password Length</label>
                        <span id="length-value" class="tool-length-value">16</span>
                    </div>
                    <input type="range" id="length-slider" min="8" max="32" value="16" class="tool-range">
                </div>

                <div class="tool-checkbox-grid">
                    <div class="tool-checkbox-row">
                        <input id="uppercase" type="checkbox" checked class="tool-checkbox">
                        <label for="uppercase" class="tool-checkbox-label">Include Uppercase (A-Z)</label>
                    </div>
                    <div class="tool-checkbox-row">
                        <input id="lowercase" type="checkbox" checked class="tool-checkbox">
                        <label for="lowercase" class="tool-checkbox-label">Include Lowercase (a-z)</label>
                    </div>
                    <div class="tool-checkbox-row">
                        <input id="numbers" type="checkbox" checked class="tool-checkbox">
                        <label for="numbers" class="tool-checkbox-label">Include Numbers (0-9)</label>
                    </div>
                    <div class="tool-checkbox-row">
                        <input id="symbols" type="checkbox" class="tool-checkbox">
                        <label for="symbols" class="tool-checkbox-label">Include Symbols (!@#$)</label>
                    </div>
                </div>

                <p id="error-msg" class="tool-error" role="status"></p>

                <button id="generate-btn" type="button" class="crusher-tool-action tool-action-block">Generate Password</button>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js" integrity="sha384-RkuNGzCebUwZ5RZDFSKGQ7sDaUpdPfDxO088yXDMPM5CvJ4eBy2Jf/UhLwGay/4K" crossorigin="anonymous"></script>

    <script>
        const passwordDisplay = document.getElementById('password-display');
        const lengthSlider = document.getElementById('length-slider');
        const lengthValue = document.getElementById('length-value');
        const uppercaseCheck = document.getElementById('uppercase');
        const lowercaseCheck = document.getElementById('lowercase');
        const numbersCheck = document.getElementById('numbers');
        const symbolsCheck = document.getElementById('symbols');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const copyFeedback = document.getElementById('copy-feedback');
        const errorMsg = document.getElementById('error-msg');

        const charSets = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        function getRandomInt(max) {
            // Rejection sampling to remove modulo bias when 2^32 is not a multiple of max.
            const range = 0x100000000;
            const limit = range - (range % max);
            const buf = new Uint32Array(1);
            do {
                window.crypto.getRandomValues(buf);
            } while (buf[0] >= limit);
            return buf[0] % max;
        }

        function generatePassword() {
            const length = lengthSlider.value;
            let charset = '';
            let password = '';
            errorMsg.textContent = '';

            if (uppercaseCheck.checked) charset += charSets.uppercase;
            if (lowercaseCheck.checked) charset += charSets.lowercase;
            if (numbersCheck.checked) charset += charSets.numbers;
            if (symbolsCheck.checked) charset += charSets.symbols;

            if (charset === '') {
                errorMsg.textContent = 'Please select at least one character set.';
                passwordDisplay.textContent = '';
                return;
            }

            for (let i = 0; i < length; i++) {
                const randomIndex = getRandomInt(charset.length);
                password += charset[randomIndex];
            }

            passwordDisplay.textContent = password;
        }

        async function copyPassword() {
            const password = passwordDisplay.textContent;
            if (!password) return;
            try {
                await navigator.clipboard.writeText(password);
            } catch {
                const textarea = document.createElement('textarea');
                textarea.value = password;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
            copyFeedback.dataset.visible = 'true';
            setTimeout(() => { copyFeedback.dataset.visible = 'false'; }, 2000);
        }

        lengthSlider.addEventListener('input', (e) => {
            lengthValue.textContent = e.target.value;
        });

        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyPassword);

        generatePassword();
    </script>
</body>
</html>
